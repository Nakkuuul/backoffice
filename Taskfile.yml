# Taskfile.yml — Sapphire Broking Backoffice (monorepo control)
# Requires go-task: https://taskfile.dev   (winget install Task.Task | brew install go-task)
#
#   task pull        update code + container images
#   task bootstrap   one-time setup: deps, env, infra, migrations
#   task up          bring the whole stack up (infra + backend + frontend)
#   task urls        show all service URLs and ports
#
# All terminal styling / cross-cutting logic lives in ./scripts (Node helpers —
# cross-platform), so the Taskfile stays declarative. See scripts/ui.mjs.
# (ui.mjs command lines are single-quoted so inner ':' / '"' are literal to YAML.)
version: '3'

silent: true

tasks:
  # ── Public commands ────────────────────────────────────────────────────────

  default:
    desc: Show the available commands
    cmds:
      - 'node scripts/ui.mjs banner'
      - task --list

  pull:
    desc: Pull the latest code and container images
    cmds:
      - 'node scripts/ui.mjs section "Pulling latest changes" "git + docker images"'
      - cmd: git pull --ff-only
        ignore_error: true
      - 'node scripts/ui.mjs info "Refreshing container images (postgres, minio, haraka)"'
      - cd backend && docker compose pull
      - 'node scripts/ui.mjs ok "Pull complete"'

  bootstrap:
    desc: One-time setup — install deps, prepare env, start infra, run migrations
    cmds:
      - 'node scripts/ui.mjs section "Bootstrapping the backoffice" "first-time setup"'
      - 'node scripts/prepare-env.mjs'
      - 'node scripts/ui.mjs info "Installing backend dependencies"'
      - cd backend && npm install --no-fund --no-audit
      - 'node scripts/ui.mjs ok "Backend dependencies installed"'
      - 'node scripts/ui.mjs info "Installing frontend dependencies"'
      - cd frontend && npm install --no-fund --no-audit
      - 'node scripts/ui.mjs ok "Frontend dependencies installed"'
      - task: _infra
      - 'node scripts/ui.mjs summary "Bootstrap complete — run task up"'

  up:
    desc: Bring the whole stack up (infra + backend + frontend together)
    cmds:
      - task: _infra
      - 'node scripts/ui.mjs section "Launching application" "starting app services"'
      # dev.mjs runs both servers with prefixed logs and prints a clear
      # service-by-service panel (infra + app) once both report ready.
      - 'node scripts/dev.mjs'

  down:
    desc: Stop the infrastructure containers
    cmds:
      - 'node scripts/ui.mjs section "Stopping infrastructure"'
      - cd backend && docker compose down
      - 'node scripts/ui.mjs ok "Infrastructure stopped (data volumes preserved)"'

  status:
    desc: Show infrastructure container status
    cmds:
      - 'node scripts/ui.mjs section "Infrastructure status"'
      - cd backend && docker compose ps

  urls:
    desc: Show all service URLs and ports
    cmds:
      - 'node scripts/ui.mjs section "Service URLs & ports" "local development"'
      - 'node scripts/ui.mjs urls'

  # ── Internal helpers ───────────────────────────────────────────────────────

  # Brings infra up (health-gated by docker compose --wait) and applies migrations.
  _infra:
    internal: true
    cmds:
      - 'node scripts/ui.mjs section "Starting infrastructure" "postgres · minio · haraka mta"'
      - 'node scripts/ui.mjs info "Starting containers and waiting for health"'
      - cd backend && docker compose up -d --wait --wait-timeout 120 postgres minio mta
      - cd backend && docker compose up -d minio-setup
      - 'node scripts/ui.mjs ok "Infrastructure healthy"'
      - 'node scripts/ui.mjs info "Applying database migrations"'
      - cd backend && npm run migrate
      - 'node scripts/ui.mjs ok "Database up to date"'

