services:
  postgres:
    image: postgres:16-alpine
    container_name: backoffice-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-backoffice}
      POSTGRES_USER: ${DB_USER:-backoffice}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-backoffice_local}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-backoffice} -d ${DB_NAME:-backoffice}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Broker's own SMTP server (Haraka). Receives mail from the app on 2525 and
  # delivers direct-to-MX. Outbound delivery REQUIRES the on-prem network to
  # allow egress on TCP/25 (see mta/README.md).
  mta:
    build: ./mta
    container_name: backoffice-mta
    restart: unless-stopped
    ports:
      # Submission port — exposed to localhost only (the app runs on the host).
      - "127.0.0.1:2525:2525"
      # Inbound MX traffic from the internet (router forwards external :25 here).
      - "25:25"
    extra_hosts:
      # Lets the inbound_forward plugin reach the app on the host.
      - "host.docker.internal:host-gateway"
    environment:
      # Outbound delivery mode the broker chooses: direct | relay
      MTA_DELIVERY_MODE: ${MTA_DELIVERY_MODE:-direct}
      MTA_HOSTNAME: ${MTA_HOSTNAME:-mail.sapphirebroking.net}
      MTA_LOCAL_DOMAINS: ${MTA_LOCAL_DOMAINS:-sapphirebroking.net}
      APP_INBOUND_URL: ${APP_INBOUND_URL:-http://host.docker.internal:3000/api/v1/email/inbound}
      APP_INBOUND_TOKEN: ${EMAIL_INBOUND_SECRET:-}
      # Used only when MTA_DELIVERY_MODE=relay:
      RELAY_HOST: ${RELAY_HOST:-}
      RELAY_PORT: ${RELAY_PORT:-587}
      RELAY_USER: ${RELAY_USER:-}
      RELAY_PASS: ${RELAY_PASS:-}
    volumes:
      - mta-queue:/haraka/queue

  # Local S3-compatible object storage for all generated files (reports, signed
  # PDFs, attachments). On-prem, S3 API — swap to real S3 later with no code change.
  minio:
    image: minio/minio:latest
    container_name: backoffice-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-backoffice}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-backoffice_secret}
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: create the bucket on first run.
  minio-setup:
    image: minio/mc:latest
    container_name: backoffice-minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-backoffice} ${S3_SECRET_KEY:-backoffice_secret}; do sleep 2; done;
      mc mb --ignore-existing local/${S3_BUCKET:-backoffice};
      mc anonymous set none local/${S3_BUCKET:-backoffice};
      echo 'bucket ready';
      "
    restart: "no"

volumes:
  pgdata:
    name: backoffice-pgdata
  mta-queue:
    name: backoffice-mta-queue
  minio-data:
    name: backoffice-minio-data
