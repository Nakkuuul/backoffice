; Outbound (direct-to-MX) delivery tuning. Validate against your link capacity
; and remote-ISP throttling on deploy. Full reference:
;   https://haraka.github.io/core/Outbound
[main]
; Keep queued mail on disk so a restart never loses messages.
disabled=false

; Max simultaneous outbound connections across all destinations. Raise to push
; more throughput, but high concurrency from few IPs gets you throttled/blocked.
pool_concurrency_max=100

; Per-destination concurrency (most ISPs throttle aggressive senders).
default_concurrency=5

; Retry schedule for temporary failures (minutes). Bounces after the last try.
; temp_fail_intervals=10,60,180,360,1440
