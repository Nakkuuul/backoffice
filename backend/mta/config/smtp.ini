; Listeners:
;   :25   — inbound MX traffic from the internet (via router port-forward)
;   :2525 — submission from the backoffice app (localhost-mapped in compose)
listen=0.0.0.0:25,0.0.0.0:2525

; Idle socket timeout (seconds).
inactivity_timeout=300

; Single process handles on-prem volume fine; for higher throughput set
; nodes=cpus (one worker per core).
;nodes=cpus
